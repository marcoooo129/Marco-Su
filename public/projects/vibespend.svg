    <circle cx="410" cy="194" r="96" fill="none" stroke="#21a35c"/>
    <circle cx="410" cy="194" r="68" fill="none" stroke="#465d63"/>
    <circle cx="410" cy="194" r="10" fill="#21a35c"/>
    <path d="M214 194h42l18-58 32 126 34-158 38 170 28-90 26 42 28-72 28 76 28-112 36 132 32-56h58" fill="none" stroke="#f0eee9" stroke-width="3"/>
    <text x="270" y="338" fill="#b4b1b5" font-family="monospace" font-size="15">“Lunch near Santa Croce, twelve euro.”</text>
  </g>
  <g transform="translate(930 432)">
    <rect width="600" height="390" fill="#dedbd4"/>
