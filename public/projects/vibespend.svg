<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">VibeSpend finance experiment preview</title>
  <desc id="desc">A dark experimental dashboard for voice expense capture and AI categorisation.</desc>
  <rect width="1600" height="1000" fill="#121214"/>
  <path d="M0 0h1600v1000H0z" fill="none" stroke="#333336" stroke-width="2"/>
  <path d="M0 250h1600M0 500h1600M0 750h1600M400 0v1000M800 0v1000M1200 0v1000" stroke="#202023"/>
  <text x="70" y="76" fill="#f0eee9" font-family="monospace" font-weight="bold" font-size="25">VIBESPEND / LAB</text>
  <text x="1320" y="76" fill="#777478" font-family="monospace" font-size="14">JUL / 2025</text>
  <text x="70" y="192" fill="#777478" font-family="monospace" font-size="13">THIS MONTH / EXPERIMENTAL VIEW</text>
  <text x="70" y="300" fill="#f0eee9" font-family="monospace" font-weight="bold" font-size="104">€ 1,284</text>
  <text x="565" y="286" fill="#21a35c" font-family="monospace" font-size="18">−12.4%</text>
  <text x="70" y="350" fill="#777478" font-family="monospace" font-size="14">Spending, seen as a conversation—not a spreadsheet.</text>
  <g transform="translate(70 432)">
